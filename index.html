    <style>
      #app-preloader{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:hsl(222 65% 6%);transition:opacity .4s ease;}
      #app-preloader.hidden{opacity:0;pointer-events:none;}
      #app-preloader .spinner{width:48px;height:48px;border:3px solid rgba(255,255,255,.15);border-top-color:hsl(25 95% 53%);border-radius:50%;animation:app-spin .8s linear infinite;}
      @keyframes app-spin{to{transform:rotate(360deg);}}
    </style>
    <div id="root"></div>
    <div id="app-preloader" aria-hidden="true"><div class="spinner"></div></div>
    <script>
      window.addEventListener('load', function () {
        var el = document.getElementById('app-preloader');
        if (!el) return;
        setTimeout(function () {
          el.classList.add('hidden');
          setTimeout(function () { el.parentNode && el.parentNode.removeChild(el); }, 500);
        }, 200);
      });
    </script>
